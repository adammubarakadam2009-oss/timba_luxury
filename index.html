<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TIMBA WORLD</title>
  <link rel="manifest" href="manifest.json">
</head>
<body>
  <header style="background:#2f3437; color:white; padding:15px; position:sticky; top:0;">
    <h1 align="center">TIMBA LUXURY</h1>
    <p align="center" style="margin:5px 0;">BUILT UNDER PRESSURE</p>
    <div id="cart-icon" style="text-align:center; margin-top:10px; cursor:pointer;" onclick="openCart()">
      🛒 Cart (<span id="cart-count">0</span>)
    </div>
  </header>

  <div style="max-width:1200px; margin:20px auto; padding:0 15px;">
    <div style="text-align:center; margin:20px 0;">
  <a href="https://sites.google.com/view/timbatee" target="_blank">
    <button style="padding:15px 30px; background-color:#25D366; color:white; border:none; border-radius:5px; cursor:pointer; font-size:18px; font-weight:bold;">
      📦 View Our Product Catalog
    </button>
  </a>
    </div>
    <div id="products" style="display:grid; grid-template-columns:1fr 1fr; gap:15px;">
      <!-- Products will appear here automatically -->
    </div>
  </div>

  <!-- Cart Popup -->
  <div id="cartModal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.5);">
    <div style="background:white; width:90%; max-width:400px; margin:50px auto; padding:20px; border-radius:10px;">
      <span onclick="closeCart()" style="float:right; font-size:24px; cursor:pointer;">&times;</span>
      <h2>Your Cart</h2>
      <div id="cart-items"></div>
      <h3 style="margin-top:15px;">Total: $<span id="cart-total">0</span></h3>
      <button onclick="checkoutWhatsApp()" style="width:100%; background:#25D366; color:white; border:none; padding:15px; border-radius:8px; font-weight:700; font-size:16px; margin-top:15px; cursor:pointer;">
        Order via WhatsApp
      </button>
    </div>
  </div>

<script>
  // 1. YOUR PRODUCTS 
  const products = [
    {id: 1, name: "Design1", price: 40, image: "Design1.png"},
    {id: 2, name: "Design2", price: 40, image: "Design2.png"},
    {id: 3, name: "Design3", price: 40, image: "Design3.png"},
    {id: 4, name: "Design4", price: 40, image: "Design4.png"},
    {id: 5, name: "Design5", price: 40, image: "Design5.png"},
    {id: 6, name: "Design6", price: 40, image: "Design6.png"}
  ];

  let cart = [];

  // 2. DISPLAY PRODUCTS ON THE PAGE
  function displayProducts() {
    const productsDiv = document.getElementById('products');
    productsDiv.innerHTML = products.map(product => `
      <div style="background:white; border-radius:8px; overflow:hidden; box-shadow:0 2px 5px rgba(0,0,0,0.1);">
        <img src="${product.image}" alt="${product.name}" style="width:100%; height:180px; object-fit:cover;">
        <div style="padding:12px;">
          <div style="font-size:14px; font-weight:600; margin-bottom:5px; height:40px;">${product.name}</div>
          <div style="font-size:16px; font-weight:700; color:#2f3437; margin-bottom:8px;">$${product.price.toLocaleString()}</div>
          <select id="size-${product.id}" style="width:100%; padding:6px; margin-bottom:10px; border:1px solid #ddd; border-radius:4px;">
            <option value="">Select Size</option>
            <option value="S">S</option>
            <option value="M">M</option>
            <option value="L">L</option>
            <option value="XL">XL</option>
          </select>
          <button onclick="addToCart(${product.id})" style="width:100%; background:#ff9900; color:white; border:none; padding:10px; border-radius:5px; font-weight:600; cursor:pointer;">Add to Cart</button>
        </div>
      </div>
    `).join('');
  }

  // 3. CART FUNCTIONS
  function addToCart(productId) {
    const size = document.getElementById(`size-${productId}`).value;
    if(!size) {
      alert('Please select a size');
      return;
    }
    
    const product = products.find(p => p.id === productId);
    const existing = cart.find(item => item.id === productId && item.size === size);
    
    if(existing) {
      existing.quantity++;
    } else {
      cart.push({ ...product, size: size, quantity: 1 });
    }
    
    updateCartCount();
    alert('Added to cart!');
  }

  function updateCartCount() {
    const count = cart.reduce((sum, item) => sum + item.quantity, 0);
    document.getElementById('cart-count').textContent = count;
  }

  function openCart() {
    const cartItemsDiv = document.getElementById('cart-items');
    if(cart.length === 0) {
      cartItemsDiv.innerHTML = '<p>Your cart is empty</p>';
    } else {
      cartItemsDiv.innerHTML = cart.map(item => `
        <div style="display:flex; justify-content:space-between; padding:10px 0; border-bottom:1px solid #eee;">
          <div>
            <strong>${item.name}</strong><br>
            Size: ${item.size} | Qty: ${item.quantity}
          </div>
          <div>$${(item.price * item.quantity).toLocaleString()}</div>
        </div>
      `).join('');
    }
    
    const total = cart.reduce((sum, item) => sum + (item.price * item.quantity), 0);
    document.getElementById('cart-total').textContent = total.toLocaleString();
    document.getElementById('cartModal').style.display = 'block';
  }

  function closeCart() {
    document.getElementById('cartModal').style.display = 'none';
  }

  // 4. WHATSAPP CHECKOUT - YOUR NUMBER
  function checkoutWhatsApp() {
    if(cart.length === 0) {
      alert('Cart is empty');
      return;
    }

    let message = `Hi TIMBA LUXURY! I want to order:%0A%0A`;
    let total = 0;
    
    cart.forEach(item => {
      message += `• ${item.name} %0A`;
      message += `  Size: ${item.size} | Qty: ${item.quantity} | $${(item.price * item.quantity).toLocaleString()} %0A%0A`;
      total += item.price * item.quantity;
    });
    
    message += `*Total: $${total.toLocaleString()}* %0A%0A`;
    message += `Please confirm availability. My name is: `;

    // YOUR WHATSAPP NUMBER: 0701 329 9620 -> 2347013299620
    const phoneNumber = "2347013299620";
    const whatsappURL = `https://wa.me/${phoneNumber}?text=${message}`;
    
    window.open(whatsappURL, '_blank');
  }

  // Load products when page opens
  displayProducts();
</script>
<script>
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js');
}
</script>
  <script src="fetch_products.js"></script>
</body>
</body>
</html>
